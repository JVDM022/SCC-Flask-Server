services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: scc_control
      POSTGRES_USER: scc
      POSTGRES_PASSWORD: scc
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/002-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scc -d scc_control"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://scc:scc@postgres:5432/scc_control
      MODEL_DIR: /app/models
      CORS_ORIGINS: http://localhost:5173
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: scc-backend
      MQTT_BASE_TOPIC: scc
    ports:
      - "5050:5000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend/hmi-dashboard
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --force"
    environment:
      VITE_API_BASE_URL: http://localhost:5050/api
      VITE_WS_URL: http://localhost:5050
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
  mosquitto-data:
  mosquitto-log:
